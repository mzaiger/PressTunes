<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PressTunes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── WALLET HUD ── */
  .wallet-hud {
    width: 100%;
    background: #05050f;
    border-bottom: 2px solid #00bfff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 16px rgba(0,191,255,0.15);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .hud-balance {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 8px #ffd70066;
    letter-spacing: 1px;
  }
  .hud-balance .hud-label {
    font-size: 9px;
    color: #004466;
    letter-spacing: 2px;
    font-weight: normal;
    display: block;
    margin-bottom: 1px;
  }
  .hud-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .hud-btn {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    border: 2px solid;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, filter 0.15s;
    background: none;
  }
  .hud-btn:hover { transform: scale(1.06); filter: brightness(1.15); }
  .btn-wallet { background: #0a0a1a; border-color: #ffd700; color: #ffd700; }
  .btn-play  { background: #003366; border-color: #00bfff; color: #00bfff; }
  .btn-play:disabled {
    background: #001133; border-color: #004466; color: #336677;
    cursor: not-allowed; transform: none; filter: none;
  }

  /* ── TOAST ── */
  .hud-toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: #05050f;
    border: 2px solid #ffd700;
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    color: #ffd700;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 30px rgba(0,0,0,0.8);
    text-align: center;
    max-width: 90vw;
  }
  .hud-toast.show { transform: translateX(-50%) translateY(0); }
  .hud-toast.win  { border-color: #00ff88; color: #00ff88; }
  .hud-toast.lose { border-color: #ff3344; color: #ff3344; }

  /* ── BLOCKED OVERLAY ── */
  .blocked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .blocked-overlay.show { display: flex; }
  .blocked-overlay .bo-icon { font-size: 48px; }
  .blocked-overlay .bo-msg {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #ff3344;
    letter-spacing: 2px;
  }
  .blocked-overlay .bo-sub {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #664444;
    letter-spacing: 1px;
  }
  .btn-go-wallet {
    display: inline-block;
    background: #0a0a1a;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-go-wallet:hover { transform: scale(1.05); }

  /* ── TUNES NOTE: play cost notice ── */
  .play-note {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #004466;
    letter-spacing: 2px;
    padding: 4px 16px;
    background: #05050f;
    width: 100%;
    text-align: center;
    border-bottom: 1px solid #001133;
  }

  /* ── GAME IFRAME ── */
  .game-wrap {
    width: 100%;
    flex: 1;
  }
  .game-wrap iframe {
    width: 100%;
    height: calc(100vh - 80px);
    border: none;
    display: block;
    background: #1a1a2e;
  }
</style>
</head>
<body>

<!-- WALLET HUD -->
<div class="wallet-hud">
  <div class="hud-balance">
    <span class="hud-label">WALLET</span>
    $<span id="hudAmt">0</span>.00
  </div>
  <div class="hud-actions">
    <a class="hud-btn btn-wallet" href="../wallet.html">← WALLET</a>
    <button class="hud-btn btn-play" id="btnPlayTunes" onclick="spendCredit()">🎵 PLAY ($1)</button>
  </div>
</div>
<div class="play-note">EACH PLAY COSTS $1 · CREDITS SHARED ACROSS ALL GAMES</div>

<!-- TOAST -->
<div class="hud-toast" id="hudToast"></div>

<!-- BLOCKED OVERLAY -->
<div class="blocked-overlay" id="blockedOverlay">
  <div class="bo-icon">⛔</div>
  <div class="bo-msg">OUT OF CREDITS</div>
  <div class="bo-sub">You need at least $1.00 to play PressTunes.</div>
  <a class="btn-go-wallet" href="../wallet.html">GO TO WALLET</a>
</div>

<!-- THE GAME -->
<div class="game-wrap">
  <iframe id="tunesFrame" src="PressTunes/index.html" title="PressTunes" allowtransparency="true"></iframe>
</div>

<script>
// ─── WALLET HELPERS ──────────────────────────────────────────────────────────
const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  return clamped;
}

let _toastTmr;
function toast(msg, type) {
  const t = document.getElementById('hudToast');
  t.textContent = msg;
  t.className = 'hud-toast show ' + (type || '');
  clearTimeout(_toastTmr);
  _toastTmr = setTimeout(() => t.classList.remove('show'), 3500);
}

function renderHud() {
  const bal = getBalance();
  document.getElementById('hudAmt').textContent = bal.toFixed(0);
  const btn = document.getElementById('btnPlayTunes');
  if (bal <= 0) {
    btn.disabled = true;
    document.getElementById('blockedOverlay').classList.add('show');
  } else {
    btn.disabled = false;
    document.getElementById('blockedOverlay').classList.remove('show');
  }
}

// PressTunes: play costs $1 each time the user presses the play button
// We patch togglePlay in the iframe to deduct a credit per song play
function spendCredit() {
  const bal = getBalance();
  if (bal <= 0) { renderHud(); return; }
  const newBal = setBalance(bal - 1);
  renderHud();
  toast(`-$1.00 · Balance: $${newBal} · Enjoy the tune! 🎵`, '');
  // Tell iframe to start playback
  try {
    const fw = document.getElementById('tunesFrame').contentWindow;
    if (fw.togglePlay) fw.togglePlay();
    else if (fw.startPlayback) fw.startPlayback();
  } catch(e) {}
}

// Patch iframe's togglePlay to require a credit
document.getElementById('tunesFrame').addEventListener('load', function() {
  try {
    const fw = this.contentWindow;
    const origToggle = fw.togglePlay;
    if (origToggle) {
      fw.togglePlay = function() {
        // Only charge on starting, not stopping
        if (!fw.isPlaying) {
          const bal = getBalance();
          if (bal <= 0) { renderHud(); return; }
          const newBal = setBalance(bal - 1);
          renderHud();
          toast(`-$1.00 · Balance: $${newBal} · 🎵`, '');
        }
        origToggle.call(fw);
      };
    }
  } catch(e) {}
});

renderHud();
</script>
</body>
</html>
